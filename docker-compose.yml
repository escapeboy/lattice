# Self-hosted Lattice Agent Gateway.
#   docker compose up --build
# Then point an MCP client at http://localhost:8765/mcp
services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: lattice/gateway:0.1.0
    ports:
      - "8765:8765"
    environment:
      LATTICE_PORT: "8765"
      LATTICE_HOST: "0.0.0.0"
      LATTICE_TRANSPORT: "http"
      # Engine: "cdp" (default, system Chromium) or "agent-browser" (build-on,
      # ADR 0002 — downloads its own Chrome for Testing on first run).
      LATTICE_ENGINE: "${LATTICE_ENGINE:-cdp}"
      LATTICE_DEVICE: "${LATTICE_DEVICE:-}"
      # Security policy — tighten these for your deployment.
      LATTICE_ALLOWED_ORIGINS: "${LATTICE_ALLOWED_ORIGINS:-}"
      LATTICE_EGRESS_ALLOWLIST: "${LATTICE_EGRESS_ALLOWLIST:-}"
      LATTICE_PROHIBITED: "${LATTICE_PROHIBITED:-captcha,account.create,hard_delete,payment,transfer}"
      # PII in traces is redacted before Svod by default; list origins to log in full.
      LATTICE_PII_FULL_ORIGINS: "${LATTICE_PII_FULL_ORIGINS:-}"
    # Headless Chromium needs a larger shared-memory segment than the 64MB default.
    shm_size: "1gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8765/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
